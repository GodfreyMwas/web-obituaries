<!DOCTYPE html>
<html>

<head>

<title>Add Loved One</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<h1>Add Loved One</h1>

<form onsubmit="createMemorial(event)">

<label>Full Name</label>
<input id="name" type="text" placeholder="Full Name" required>

<label>Date of Birth</label>
<input id="birth" type="date" required>

<label>Date of Passing</label>
<input id="passing" type="date" required>

<label>Biography</label>
<textarea id="bio" placeholder="Write life story"></textarea>

<label>Upload Photo</label>
<input type="file">

<label>Donation Link</label>
<input type="text" placeholder="Donation link">

<button type="submit">Create Memorial</button>

</form>

<script src="js/memorial.js"></script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memorial</title>

<style>
body{text-align:center;font-family:Arial;}
#popup{
display:none;
position:fixed;
top:40%;
left:30%;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<h1>Memorial Page</h1>

<button onclick="toggleMusic()" id="musicBtn">Play Music</button>
<audio id="bgMusic">
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<h2>Light a Candle</h2>
<button onclick="lightCandle('Hope')">Hope</button>
<button onclick="lightCandle('Love')">Love</button>
<button onclick="lightCandle('Peace')">Peace</button>
<p id="candleCount">0</p>

<h2>Send Flowers</h2>
<button onclick="sendFlower('Rose')">Rose</button>
<button onclick="sendFlower('Lily')">Lily</button>
<button onclick="sendFlower('Daisy')">Daisy</button>
<p id="flowerCount">0</p>

<div id="popup"><p id="popupText"></p></div>

<h2>Condolence Wall</h2>
<input id="condolenceInput">
<button onclick="addCondolence()">Send</button>
<div id="condolenceWall"></div>

<h2>Family Wall</h2>
<input id="familyInput">
<button onclick="sendFamily()">Send</button>
<div id="familyWall"></div>

<script src="js/memorial.js"></script>

</body>
</html>
